services:
  db:
    image: postgres:14
    container_name: beautitrust_db
    environment:
      POSTGRES_DB: beautitrust_db
      POSTGRES_USER: beautitrust_user
      POSTGRES_PASSWORD: beautitrust_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: beautitrust_web
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - PROJECT_DEBUG=True
      - DB_NAME=beautitrust_db
      - DB_USER=beautitrust_user
      - DB_PASSWORD=beautitrust_pass
      - DB_HOST=db
      - DB_PORT=5432

volumes:
  postgres_data: