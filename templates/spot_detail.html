{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Beauty Spot - BeautiTrust</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        body { font-family: Arial; background: #fef6e4; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 20px; padding: 30px; }
        img { width: 100%; border-radius: 15px; }
        h1 { color: #6a0734; }
        .detail { margin: 15px 0; padding: 10px; background: #f9f9f9; border-radius: 10px; }
        .service { background: #fef6e4; padding: 10px; margin: 10px 0; border-radius: 10px; }
        .review { border-bottom: 1px solid #ddd; padding: 10px 0; }
        button { background: #EF78C4; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .back { display: inline-block; margin-bottom: 20px; background: #EF78C4; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; }
        .review-form { margin-top: 30px; padding: 20px; background: #fef6e4; border-radius: 15px; display: none; }
        .review-form textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin: 10px 0; }
        .rating-stars { font-size: 30px; cursor: pointer; margin: 10px 0; }
        .rating-stars span { color: #ccc; margin-right: 5px; cursor: pointer; }
        .rating-stars span.selected { color: gold; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container" id="content">
        <div style="text-align: center; padding: 50px;">Loading...</div>
    </div>

    <script>
        const spotId = window.location.pathname.split('/')[2];
        let selectedRating = 0;
        
        function showReviewForm() {
            const formDiv = document.getElementById('reviewFormDiv');
            if (formDiv) {
                formDiv.style.display = 'block';
            }
        }
        
        function setRating(rating) {
            selectedRating = rating;
            const stars = document.querySelectorAll('#ratingStars span');
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.innerHTML = '★';
                    star.classList.add('selected');
                } else {
                    star.innerHTML = '☆';
                    star.classList.remove('selected');
                }
            });
        }
        
        function submitReview() {
            const comment = document.getElementById('reviewComment').value;
            
            if (selectedRating === 0) {
                document.getElementById('reviewMessage').innerHTML = 'Please select a rating';
                return;
            }
            if (comment.trim() === '') {
                document.getElementById('reviewMessage').innerHTML = 'Please write a comment';
                return;
            }
            
            fetch('/api/check-auth/')
                .then(res => res.json())
                .then(auth => {
                    if (!auth.is_authenticated) {
                        alert("Please login to leave a review!");
                        window.location.href = '/login/';
                        return;
                    }
                    
                    fetch('/api/add-review/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            beautyspot_id: parseInt(spotId),
                            rating: selectedRating,
                            comment: comment
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            document.getElementById('reviewMessage').innerHTML = '<span class="success">✓ Review submitted! Reloading...</span>';
                            setTimeout(() => location.reload(), 1500);
                        } else {
                            document.getElementById('reviewMessage').innerHTML = '<span class="error">' + data.error + '</span>';
                        }
                    });
                });
        }
        
        //Book a specific service
        function addServiceToCart(serviceId, serviceName, servicePrice) {
            fetch('/api/check-auth/')
                .then(res => res.json())
                .then(auth => {
                    if (!auth.is_authenticated) {
                        alert("Please login to book a service!");
                        window.location.href = '/login/';
                        return;
                    }
                    fetch('/api/add-to-cart/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            item_type: 'service',
                            item_id: serviceId
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            alert(`✅ ${serviceName} added to cart (${servicePrice} DT)`);
                        } else {
                            alert("Error: " + data.error);
                        }
                    })
                    .catch(err => alert("Request failed: " + err));
                });
        }
        
        fetch('/api/spot/' + spotId + '/')
            .then(res => res.json())
            .then(spot => {
                let servicesHtml = '';
                if (spot.services && spot.services.length > 0) {
                    servicesHtml = '<h3>Services</h3>';
                    for (let i = 0; i < spot.services.length; i++) {
                        let service = spot.services[i];
                        servicesHtml += `
                            <div class="service">
                                <strong>${service.name}</strong> - ${service.price} DT<br>
                                <small>${service.description || ''}</small><br>
                                <button onclick="addServiceToCart(${service.id}, '${service.name.replace(/'/g, "\\'")}', ${service.price})" style="margin-top: 5px; background:#AD2555; padding:5px 10px;">📅 Book this service</button>
                            </div>
                        `;
                    }
                }
                
                let reviewsHtml = '<h3>Customer Reviews</h3>';
                if (spot.reviews && spot.reviews.length > 0) {
                    for (let i = 0; i < spot.reviews.length; i++) {
                        let starDisplay = '';
                        for (let s = 0; s < spot.reviews[i].rating; s++) starDisplay += '★';
                        for (let s = spot.reviews[i].rating; s < 5; s++) starDisplay += '☆';
                        reviewsHtml += '<div class="review"><strong>' + spot.reviews[i].user__full_name + '</strong> - ' + starDisplay + '<br>' + spot.reviews[i].comment + '</div>';
                    }
                    reviewsHtml += '<p style="margin-top: 10px; color: #999;">Total: ' + spot.reviews.length + ' reviews</p>';
                } else {
                    reviewsHtml += '<p>No reviews yet. Be the first to review!</p>';
                }
                
                const reviewFormHtml = `
                    <div id="reviewFormDiv" class="review-form">
                        <h3>Write Your Review</h3>
                        <div class="rating-stars" id="ratingStars">
                            <span onclick="setRating(1)">☆</span>
                            <span onclick="setRating(2)">☆</span>
                            <span onclick="setRating(3)">☆</span>
                            <span onclick="setRating(4)">☆</span>
                            <span onclick="setRating(5)">☆</span>
                        </div>
                        <textarea id="reviewComment" rows="4" placeholder="Share your experience..."></textarea>
                        <button onclick="submitReview()">Submit Review</button>
                        <div id="reviewMessage"></div>
                    </div>
                `;
                
                document.getElementById('content').innerHTML = `
                    <a href="/home/" class="back">← Back to Home</a>
                    <img src="${spot.image_url}">
                    <h1>${spot.name}</h1>
                    <p>${spot.description}</p>
                    <div class="detail"><i class="fas fa-map-marker-alt"></i> ${spot.address}, ${spot.city}</div>
                    <div class="detail"><i class="fas fa-phone"></i> ${spot.phone || 'Not provided'}</div>
                    ${servicesHtml}
                    ${reviewsHtml}
                    <button onclick="showReviewForm()">✍️ Write a Review</button>
                    ${reviewFormHtml}
                `;
            })
            .catch(error => {
                document.getElementById('content').innerHTML = '<div style="text-align: center; padding: 50px;">Error loading spot. Please try again.</div>';
            });
    </script>
</body>
</html>
