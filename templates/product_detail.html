{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Product Details - BeautiTrust</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        body { font-family: Arial; background: #fef6e4; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 20px; padding: 30px; }
        img { width: 100%; border-radius: 15px; }
        h1 { color: #6a0734; }
        .detail { margin: 15px 0; padding: 10px; background: #f9f9f9; border-radius: 10px; display: flex; align-items: center; gap: 10px; }
        .detail i { width: 25px; color: #EF78C4; }
        .price { font-size: 32px; color: #EF78C4; font-weight: bold; margin: 20px 0; }
        .back { display: inline-block; margin-bottom: 20px; background: #EF78C4; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; }
        button { background: #EF78C4; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; margin-top: 20px; font-size: 16px; margin-right: 10px; }
        button:hover { background: #AD2555; }
        .review { border-bottom: 1px solid #ddd; padding: 15px 0; }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .reviewer-name { font-weight: bold; color: #6a0734; }
        .review-stars { color: gold; font-size: 16px; }
        .review-date { color: #999; font-size: 12px; }
        .review-comment { color: #555; line-height: 1.5; margin-top: 10px; }
        .review-form { margin-top: 30px; padding: 20px; background: #fef6e4; border-radius: 15px; display: none; }
        .review-form textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin: 10px 0; }
        .rating-stars { font-size: 30px; cursor: pointer; margin: 10px 0; }
        .rating-stars span { color: #ccc; margin-right: 5px; cursor: pointer; }
        .rating-stars span.selected { color: gold; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; }
        .provider-section { margin-top: 20px; padding: 15px; background: #fef6e4; border-radius: 15px; }
        .provider-section h3 { color: #6a0734; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container" id="content">
        <div style="text-align: center; padding: 50px;">Loading...</div>
    </div>

    <script>
        const productId = window.location.pathname.split('/')[2];
        let selectedRating = 0;
        
        function showReviewForm() {
            const formDiv = document.getElementById('reviewFormDiv');
            if (formDiv) {
                formDiv.style.display = 'block';
            }
        }
        
        function setRating(rating) {
            selectedRating = rating;
            const stars = document.querySelectorAll('#ratingStars span');
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.innerHTML = '★';
                    star.classList.add('selected');
                } else {
                    star.innerHTML = '☆';
                    star.classList.remove('selected');
                }
            });
        }
        
        function submitReview() {
            const comment = document.getElementById('reviewComment').value;
            
            if (selectedRating === 0) {
                document.getElementById('reviewMessage').innerHTML = 'Please select a rating';
                return;
            }
            if (comment.trim() === '') {
                document.getElementById('reviewMessage').innerHTML = 'Please write a comment';
                return;
            }
            
            fetch('/api/check-auth/')
                .then(res => res.json())
                .then(auth => {
                    if (!auth.is_authenticated) {
                        alert("Please login to leave a review!");
                        window.location.href = '/login/';
                        return;
                    }
                    
                    fetch('/api/add-product-review/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            product_id: parseInt(productId),
                            rating: selectedRating,
                            comment: comment
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            document.getElementById('reviewMessage').innerHTML = '<span class="success">✓ Review submitted! Reloading...</span>';
                            setTimeout(() => location.reload(), 1500);
                        } else {
                            document.getElementById('reviewMessage').innerHTML = '<span class="error">' + data.error + '</span>';
                        }
                    });
                });
        }
        
   
        fetch('/api/product/' + productId + '/')
            .then(res => res.json())
            .then(product => {
                console.log('Product loaded:', product);
                
                // Build reviews HTML
                let reviewsHtml = '<h3><i class="fas fa-star"></i> Customer Reviews</h3>';
                if (product.reviews && product.reviews.length > 0) {
                    for (let i = 0; i < product.reviews.length; i++) {
                        let starDisplay = '';
                        for (let s = 0; s < product.reviews[i].rating; s++) starDisplay += '★';
                        for (let s = product.reviews[i].rating; s < 5; s++) starDisplay += '☆';
                        reviewsHtml += `
                            <div class="review">
                                <div class="review-header">
                                    <span class="reviewer-name">${product.reviews[i].user__full_name}</span>
                                    <span class="review-stars">${starDisplay}</span>
                                    <span class="review-date">${new Date(product.reviews[i].created_at).toLocaleDateString()}</span>
                                </div>
                                <div class="review-comment">${product.reviews[i].comment}</div>
                            </div>
                        `;
                    }
                    reviewsHtml += `<p style="margin-top: 10px; color: #999;">Total: ${product.reviews.length} reviews | Average: ${product.avg_rating} / 5</p>`;
                } else {
                    reviewsHtml += '<p style="color: #999;">No reviews yet. Be the first to review this product!</p>';
                }
                
                // Build star display for average rating
                let avgStarDisplay = '';
                if (product.avg_rating > 0) {
                    for (let s = 0; s < Math.floor(product.avg_rating); s++) avgStarDisplay += '★';
                    for (let s = Math.floor(product.avg_rating); s < 5; s++) avgStarDisplay += '☆';
                } else {
                    avgStarDisplay = '☆☆☆☆☆';
                }
                
                const reviewFormHtml = `
                    <div id="reviewFormDiv" class="review-form">
                        <h3>Write a Review</h3>
                        <div class="rating-stars" id="ratingStars">
                            <span onclick="setRating(1)">☆</span>
                            <span onclick="setRating(2)">☆</span>
                            <span onclick="setRating(3)">☆</span>
                            <span onclick="setRating(4)">☆</span>
                            <span onclick="setRating(5)">☆</span>
                        </div>
                        <textarea id="reviewComment" rows="4" placeholder="Share your experience with this product..."></textarea>
                        <button onclick="submitReview()">Submit Review</button>
                        <div id="reviewMessage"></div>
                    </div>
                `;
                
                document.getElementById('content').innerHTML = `
                    <a href="/home/" class="back">← Back to Home</a>
                    <img src="${product.image_url}">
                    <h1>${product.name}</h1>
                    <p>${product.description}</p>
                    <div class="price">💰 ${product.price} DT</div>
                    
                    <div class="detail"><i class="fas fa-tag"></i> <strong>Category:</strong> ${product.category}</div>
                    <div class="detail"><i class="fas fa-star"></i> <strong>Average Rating:</strong> ${avgStarDisplay} (${product.avg_rating} / 5) - ${product.review_count} reviews</div>
                    
                    <div class="provider-section">
                        <h3><i class="fas fa-store"></i> Provider Information</h3>
                        <div class="detail"><i class="fas fa-user"></i> <strong>Name:</strong> ${product.provider_name}</div>
                        <div class="detail"><i class="fas fa-phone"></i> <strong>Phone:</strong> ${product.provider_phone || 'Not provided'}</div>
                        <div class="detail"><i class="fas fa-envelope"></i> <strong>Email:</strong> ${product.provider_email || 'Not provided'}</div>
                        <div class="detail"><i class="fas fa-map-marker-alt"></i> <strong>City:</strong> ${product.provider_city || 'Not provided'}</div>
                    </div>
                    
                    ${reviewsHtml}
                    
                    <button onclick="showReviewForm()">✍️ Write a Review</button>
                    <!-- ADD TO CART BUTTON REMOVED FROM HERE -->
                    ${reviewFormHtml}
                `;
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = '<div style="text-align: center; padding: 50px;">Error loading product. Please try again.</div>';
            });
    </script>
</body>
</html>
