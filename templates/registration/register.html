{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register - BeautiTrust</title>
    <link rel="stylesheet" href="{% static 'css/landing.css' %}">
</head>
<body>
    <div style="max-width:500px; margin:50px auto; padding:30px; background:white; border-radius:15px;">
        <h2>Create Account to Book</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="width:100%; padding:10px; background:#EF78C4; color:white; border:none;">Register</button>
        </form>
        <p>Already have an account? <a href="{% url 'login' %}">Login here</a></p>
    </div>
</body>
</html>
