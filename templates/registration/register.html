{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register - BeautiTrust</title>
    <link rel="stylesheet" href="{% static 'css/landing.css' %}">
    <style>
        .register-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .register-container h2 {
            text-align: center;
            color: #6a0734;
            margin-bottom: 20px;
        }
        .register-container button {
            width: 100%;
            padding: 12px;
            background: #EF78C4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
        }
        .register-container button:hover {
            background: #AD2555;
        }
        .register-container input, .register-container select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .errorlist {
            color: red;
            list-style: none;
            padding: 0;
        }
/* Radio button styling */
ul {
    list-style: none;
    padding-left: 0;
    display: flex;
    gap: 20px;
    margin-top: 5px;
}

ul li {
    display: inline-flex;
    align-items: center;
    gap: 5px;
}

input[type="radio"] {
    width: auto !important;
    margin-right: 5px;
}
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Join BeautiTrust</h2>
        <form method="POST" autocomplete="off">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register</button>
        </form>
        <p style="text-align: center; margin-top: 15px;">
            Already have an account? <a href="{% url 'login' %}">Login here</a>
        </p>
    </div>
</body>
</html>
