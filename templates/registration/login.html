{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login - BeautiTrust</title>
    <link rel="stylesheet" href="{% static 'css/landing.css' %}">
</head>
<body>
    <div style="max-width:400px; margin:100px auto; padding:30px; background:white; border-radius:15px;">
        <h2>Login to Book</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="email" name="email" placeholder="Email" required style="width:100%; padding:10px; margin:10px 0;">
            <input type="password" name="password" placeholder="Password" required style="width:100%; padding:10px; margin:10px 0;">
            <button type="submit" style="width:100%; padding:10px; background:#EF78C4; color:white; border:none;">Login</button>
        </form>
        <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
    </div>
</body>
</html>
